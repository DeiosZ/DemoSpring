
services:
  mysql:
    image: mysql:8.3
    container_name: mysql_demo
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: tareas_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-pmysql", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s        # ← le da tiempo a MySQL para inicializar

  app:
    build: .
    container_name: spring_demo
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/tareas_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      DB_USER_NAME: root
      DB_PASSWORD: mysql
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure         # ← reintenta si arranca antes que MySQL

volumes:
  mysql_data: